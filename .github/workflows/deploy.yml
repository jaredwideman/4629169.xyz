name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy static site to nginx
        shell: powershell
        run: |
          $source = "${{ github.workspace }}\public\*"
          $dest = "C:\nginx\html"
          Get-ChildItem -Path $dest -Exclude '.well-known' | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path $source -Destination $dest -Recurse -Force
          Write-Host "Deployed static site to $dest"

      - name: Configure nginx proxy for /blog/
        shell: powershell
        run: |
          $nginxConf = "C:\nginx\conf\nginx.conf"
          $content = Get-Content $nginxConf -Raw
          $changed = $false

          # Remove old /the-buckhorner/ proxy blocks if present.
          $content2 = [regex]::Replace($content, '(?ms)\s*#\s*the-buckhorner proxy\s*\r?\n\s*location\s+/the-buckhorner/\s*\{[^}]*\}\s*', "`n")
          $content2 = [regex]::Replace($content2, '(?ms)\s*location\s+/the-buckhorner/\s*\{[^}]*\}\s*', "`n")
          if ($content2 -ne $content) { $content = $content2; $changed = $true; Write-Host "Removed old /the-buckhorner/ nginx block" }

          # Always replace our blog proxy block so workflow fixes are applied to nginx.
          $content2 = [regex]::Replace($content, '(?ms)\s*#\s*blog proxy\s*\r?\n\s*location\s*=\s*/blog\s*\{.*?\}\s*location\s+/blog/\s*\{.*?\}\s*', "`n")
          $content2 = [regex]::Replace($content2, '(?ms)\s*#\s*blog proxy\s*\r?\n\s*location\s+/blog/\s*\{.*?\}\s*', "`n")
          if ($content2 -ne $content) { $content = $content2; $changed = $true; Write-Host "Removed existing /blog nginx block" }

          $proxyBlock = "`n            # blog proxy`n"
            $proxyBlock += "            location = /blog {`n"
            $proxyBlock += "                proxy_pass http://127.0.0.1:3001;`n"
            $proxyBlock += "                proxy_http_version 1.1;`n"
            $proxyBlock += '                proxy_set_header Host $host;' + "`n"
            $proxyBlock += '                proxy_set_header X-Real-IP $remote_addr;' + "`n"
            $proxyBlock += '                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' + "`n"
            $proxyBlock += '                proxy_set_header X-Forwarded-Proto $scheme;' + "`n"
            $proxyBlock += "            }`n"
            $proxyBlock += "            location /blog/ {`n"
            $proxyBlock += "                proxy_pass http://127.0.0.1:3001;`n"
            $proxyBlock += "                proxy_http_version 1.1;`n"
            $proxyBlock += '                proxy_set_header Upgrade $http_upgrade;' + "`n"
            $proxyBlock += "                proxy_set_header Connection 'upgrade';`n"
            $proxyBlock += '                proxy_set_header Host $host;' + "`n"
            $proxyBlock += '                proxy_set_header X-Real-IP $remote_addr;' + "`n"
            $proxyBlock += '                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' + "`n"
            $proxyBlock += '                proxy_set_header X-Forwarded-Proto $scheme;' + "`n"
            $proxyBlock += '                proxy_cache_bypass $http_upgrade;' + "`n"
            $proxyBlock += "                client_max_body_size 500m;`n"
            $proxyBlock += "            }`n"

            if ($content -match "(?s)(location\s+/jellyfin/.+?\})") {
              $content = $content.Replace($Matches[0], $Matches[0] + $proxyBlock)
            } else {
              $content = $content -replace '(\}\s*\}\s*)$', ($proxyBlock + '$1')
            }
          $changed = $true
          Write-Host "Added /blog/ proxy block"

          if ($changed) {
            Set-Content -Path $nginxConf -Value $content -NoNewline
            & C:\nginx\nginx.exe -p C:\nginx -s reload
            Write-Host "nginx reloaded"
          } else {
            Write-Host "nginx config already up to date"
          }

      - name: Provision blog-content checkout
        shell: powershell
        run: |
          $contentDir = "C:\apps\blog-content"
          $repo = "${{ github.repository }}"
          if (-not (Test-Path $contentDir)) {
            git clone "https://github.com/$repo.git" $contentDir
          }
          Set-Location $contentDir
          git config user.name "Blog Bot"
          git config user.email "blog-bot@4629169.xyz"
          git remote set-url origin "https://github.com/$repo.git"
          git checkout main
          git pull --rebase --autostash origin main

      - name: Ensure ImageMagick for HEIC conversion
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          if (-not (Get-Command magick -ErrorAction SilentlyContinue)) {
            if (Get-Command winget -ErrorAction SilentlyContinue) {
              winget install --id ImageMagick.ImageMagick --exact --silent --accept-package-agreements --accept-source-agreements
            }
          }

      - name: Deploy the-blog
        shell: powershell
        env:
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          BLOG_GIT_PAT: ${{ secrets.BLOG_GIT_PAT }}
        run: |
          $appDir = "C:\apps\the-blog"
          $source = "${{ github.workspace }}\the-blog"
          $taskName = "The Blog"
          $contentDir = "C:\apps\blog-content"

          if (-not (Test-Path $appDir)) { New-Item -ItemType Directory -Path $appDir -Force | Out-Null }

          robocopy $source $appDir /MIR /XD node_modules .next .git public\uploads /XF .env.local /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
          $LASTEXITCODE = 0

          $magickPath = ""
          $magickCmd = Get-Command magick -ErrorAction SilentlyContinue
          if ($magickCmd) {
            $magickPath = $magickCmd.Source
          } else {
            $magickExe = Get-ChildItem "C:\Program Files" -Directory -Filter "ImageMagick*" -ErrorAction SilentlyContinue |
              Sort-Object Name -Descending |
              Select-Object -First 1 |
              ForEach-Object { Join-Path $_.FullName "magick.exe" }
            if ($magickExe -and (Test-Path $magickExe)) { $magickPath = $magickExe }
          }

          $envLines = @(
            "ALLOWED_EMAILS=$($env:ALLOWED_EMAILS)",
            "SESSION_SECRET=$($env:SESSION_SECRET)",
            "RESEND_API_KEY=$($env:RESEND_API_KEY)",
            "MAIL_FROM=$($env:MAIL_FROM)",
            "PUBLIC_URL=https://4629169.xyz",
            "BLOG_CONTENT_DIR=$contentDir",
            "UPLOADS_DIR=C:\apps\blog-media\uploads",
            "LIBHEIF_SECURITY_LIMITS=off",
            "IMAGEMAGICK_PATH=$magickPath",
            "BLOG_GIT_PAT=$($env:BLOG_GIT_PAT)",
            "GIT_AUTHOR_NAME=Blog Bot",
            "GIT_AUTHOR_EMAIL=blog-bot@4629169.xyz",
            "GIT_REMOTE=origin",
            "GIT_BRANCH=main",
            "NEXT_PUBLIC_BASE_PATH=/blog"
          )
          Set-Content -Path "$appDir\.env.local" -Value ($envLines -join "`r`n") -NoNewline
          $mediaDir = "C:\apps\blog-media\uploads"
          New-Item -ItemType Directory -Path $mediaDir -Force | Out-Null
          # One-time migration for uploads that were saved under the app directory before media was split out.
          $oldUploads = "$appDir\public\uploads"
          if (Test-Path $oldUploads) {
            robocopy $oldUploads $mediaDir /E /NFL /NDL /NJH /NJS
            if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
            $LASTEXITCODE = 0
          }

          Set-Location $appDir
          $env:NEXT_PUBLIC_BASE_PATH = "/blog"
          npm install --production=false
          npm run build

          if (Get-ScheduledTask -TaskName $taskName -ErrorAction SilentlyContinue) {
            Stop-ScheduledTask -TaskName $taskName -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
          }
          Get-CimInstance Win32_Process -Filter "Name='node.exe'" | Where-Object {
            $_.CommandLine -like "*the-blog*"
          } | ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }

          $action = New-ScheduledTaskAction `
            -Execute "powershell.exe" `
            -Argument "-ExecutionPolicy Bypass -WindowStyle Hidden -File `"$appDir\start.ps1`"" `
            -WorkingDirectory $appDir
          $trigger = New-ScheduledTaskTrigger -AtStartup
          $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable
          $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest
          Register-ScheduledTask -TaskName $taskName -Action $action -Trigger $trigger -Settings $settings -Principal $principal -Force | Out-Null
          Start-ScheduledTask -TaskName $taskName
          Write-Host "Started scheduled task: $taskName"
